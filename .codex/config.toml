[agents]
# Start conservatively: one parent session with room for a planner,
# reviewer, memory keeper, and one active experiment worker.
max_threads = 4
max_depth = 1

[agents.planner]
description = "Read-only autolab research planner."
config_file = "./agents/planner.toml"

[agents.experiment_worker]
description = "Autolab experiment worker constrained to one comparable benchmark run."
config_file = "./agents/experiment-worker.toml"

[agents.memory_keeper]
description = "Autolab research memory maintainer."
config_file = "./agents/memory-keeper.toml"

[agents.reviewer]
description = "Read-only autolab rule and comparability reviewer."
config_file = "./agents/reviewer.toml"
