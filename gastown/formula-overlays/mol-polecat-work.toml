[[step-overrides]]
step_id = "load-context"
mode = "replace"
description = """
Initialize your experiment assignment.

1. Prime your environment and read the assigned bead.
2. Identify the current master hash and current master metric from the task context.
3. Confirm the hypothesis is still fresh and not already invalidated by newer swarm results.
4. Confirm the allowed edit scope is `train.py` only unless the bead explicitly says otherwise.
5. State the one change you are going to test before editing.

Exit criteria: you know the exact single hypothesis you are testing, the current master context, and the allowed edit scope."""

[[step-overrides]]
step_id = "implement"
mode = "replace"
description = """
Implement exactly one experiment change in `train.py`.

Rules:
- one hypothesis only
- no unrelated cleanup
- no `prepare.py` edits
- optimize for a fair local comparison against current master

Persist useful findings to the bead as you work, especially if you discover:
- the idea is already stale
- the idea overlaps a recent experiment
- the idea likely trades throughput for quality in a bad way

Exit criteria: `train.py` reflects one deliberate experiment change and nothing else."""

[[step-overrides]]
step_id = "pre-verify"
mode = "replace"
description = """
Run the benchmark experiment exactly as required by the rig.

Record:
- parent master hash
- local `val_bpb`
- whether the run completed successfully
- any obvious runtime or stability issues

If the run does not produce a valid metric, treat it as a failed experiment and persist why."""

[[step-overrides]]
step_id = "submit"
mode = "replace"
description = """
Make the submit decision.

If local `val_bpb` is better than current master:
- generate the patch diff
- submit with a comment that states the hypothesis and the observed result

If local `val_bpb` is not better:
- do not submit
- persist a concise postmortem so the idea is not retried blindly

Exit criteria: the bead clearly records whether the experiment was submitted and why."""
